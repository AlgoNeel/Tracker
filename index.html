<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEELX Trader | Mobile Journal</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230f172a%22/><path d=%22M30 40v20M30 45h6v10h-6zM50 30v40M50 35h6v30h-6zM70 50v20M70 55h6v10h-6z%22 stroke=%22%23818cf8%22 stroke-width=%224%22 fill=%22none%22/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .safe-top { padding-top: env(safe-area-inset-top); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .trade-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .trade-card:active {
            transform: scale(0.98);
            background-color: #f1f5f9;
        }

        .details-pane {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .details-pane.open {
            max-height: 800px;
        }

        .win-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .loss-gradient { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .be-gradient { background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%); }
        .running-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }

        @keyframes pulse-blue {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse-blue 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        #tradeList { min-height: 300px; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div id="modalContainer"></div>

    <!-- Header / Stats Section -->
    <header class="safe-top bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="px-5 py-4">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-3">
                    <div class="bg-slate-900 p-2 rounded-xl shadow-lg">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2.5">
                            <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                            <polyline points="16 7 22 7 22 13"></polyline>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-lg font-extrabold text-slate-900 leading-none">NEELX Trader</h1>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Mobile Terminal</p>
                    </div>
                </div>
                <div id="syncStatus" class="px-2 py-1 rounded-full bg-emerald-50 text-emerald-600 text-[9px] font-black uppercase tracking-tighter border border-emerald-100">
                    LIVE SYNC
                </div>
            </div>

            <div class="bg-slate-900 rounded-2xl p-4 text-white shadow-xl shadow-slate-200 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="white"><path d="M22 7L13.5 15.5L8.5 10.5L2 17H22V7Z"/></svg>
                </div>
                <div class="relative z-10">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Current Balance</p>
                    <div class="flex items-baseline gap-2">
                        <h2 id="currentBalance" class="text-3xl font-black">$0.00</h2>
                        <span id="pnlPercent" class="text-xs font-bold text-emerald-400">+0.00%</span>
                    </div>
                    <div class="flex gap-4 mt-4 pt-4 border-t border-slate-800">
                        <div>
                            <p class="text-[9px] font-bold text-slate-500 uppercase">Initial</p>
                            <p id="displayCap" class="text-sm font-bold text-slate-200">$0.00</p>
                        </div>
                        <div>
                            <p class="text-[9px] font-bold text-slate-500 uppercase">Win Rate</p>
                            <p id="statWinRate" class="text-sm font-bold text-indigo-400">0%</p>
                        </div>
                        <div>
                            <p class="text-[9px] font-bold text-slate-500 uppercase">Trades</p>
                            <p id="statTotal" class="text-sm font-bold text-slate-200">0</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 px-5 py-6">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-sm font-extrabold text-slate-800 uppercase tracking-wider">Recent Activity</h3>
            <div class="text-[10px] font-bold text-slate-400">
                <span id="statDuration">0</span> TRADING DAYS
            </div>
        </div>

        <div id="tradeList" class="space-y-4">
            <div class="animate-pulse flex flex-col gap-4">
                <div class="h-24 bg-slate-200 rounded-2xl w-full"></div>
                <div class="h-24 bg-slate-200 rounded-2xl w-full"></div>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-slate-100 px-6 py-4 pb-8">
        <div class="flex justify-between items-center">
            <p class="text-[10px] text-slate-400 font-bold uppercase">&copy; 2024 Swapneel Das</p>
            <button onclick="showModal('disclaimer')" class="text-[10px] font-black text-indigo-600 uppercase tracking-widest">Disclaimer</button>
        </div>
    </footer>

    <script>
        let trades = [];
        let initialCapital = 0;

        async function loadData() {
            try {
                const response = await fetch(`data.json?t=${Date.now()}`);
                if (!response.ok) throw new Error("Could not find data.json");
                
                const data = await response.json();
                trades = data.trades || [];
                initialCapital = data.initialCapital || 0;
                
                render();
            } catch (err) {
                console.error(err);
                document.getElementById('tradeList').innerHTML = `<div class="text-center py-10 text-rose-500 text-xs font-bold">DATA ERROR</div>`;
            }
        }

        function calculateStats() {
            let net = 0, wins = 0, losses = 0, uniqueDates = new Set();
            trades.forEach(t => {
                const pnl = parseFloat(t.pnl) || 0;
                const fee = parseFloat(t.commission) || 0;
                net += (pnl - fee);
                if (t.result === 'Win') wins++;
                else if (t.result === 'Loss') losses++;
                if (t.date) uniqueDates.add(t.date);
            });

            const current = initialCapital + net;
            const growth = initialCapital > 0 ? ((net / initialCapital) * 100).toFixed(2) : "0.00";
            
            document.getElementById('displayCap').innerText = `$${initialCapital.toLocaleString()}`;
            document.getElementById('currentBalance').innerText = `$${current.toLocaleString(undefined, { minimumFractionDigits: 2 })}`;
            const pnlEl = document.getElementById('pnlPercent');
            pnlEl.innerText = `${net >= 0 ? '+' : ''}${growth}%`;
            pnlEl.className = `text-xs font-bold ${net >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;
            document.getElementById('statTotal').innerText = trades.length;
            const wr = (wins + losses) > 0 ? ((wins / (wins + losses)) * 100).toFixed(0) : 0;
            document.getElementById('statWinRate').innerText = `${wr}%`;
            document.getElementById('statDuration').innerText = uniqueDates.size;
        }

        function toggleDetails(id) {
            const pane = document.getElementById(`pane-${id}`);
            const chevron = document.getElementById(`chev-${id}`);
            const isOpen = pane.classList.toggle('open');
            chevron.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function render() {
            const container = document.getElementById('tradeList');
            container.innerHTML = '';

            const sortedTrades = [...trades].sort((a, b) => new Date(b.date) - new Date(a.date) || b.id - a.id);

            sortedTrades.forEach((trade, index) => {
                const tradeId = trade.id || index;
                const isRunning = !trade.exit || trade.exit === "";
                const net = (parseFloat(trade.pnl) || 0) - (parseFloat(trade.commission) || 0);
                
                // Set color indicators
                let gradClass = 'be-gradient';
                let pnlDisplay = `$${net.toFixed(2)}`;
                let statusLabel = "CLOSED";
                let statusColor = "text-slate-400";

                if (isRunning) {
                    gradClass = 'running-gradient animate-pulse-slow';
                    pnlDisplay = "---";
                    statusLabel = "RUNNING";
                    statusColor = "text-blue-500";
                } else if (trade.result === 'Win') {
                    gradClass = 'win-gradient';
                    statusColor = "text-emerald-500";
                } else if (trade.result === 'Loss') {
                    gradClass = 'loss-gradient';
                    statusColor = "text-rose-500";
                }

                const card = document.createElement('div');
                card.className = "trade-card bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden mb-4";
                card.onclick = () => toggleDetails(tradeId);
                
                card.innerHTML = `
                    <div class="p-4 flex items-center gap-4">
                        <div class="w-1.5 h-10 rounded-full ${gradClass}"></div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h4 class="font-black text-slate-900 uppercase tracking-tight">${trade.asset}</h4>
                                <span class="text-xs font-black ${isRunning ? 'text-blue-500' : (net >= 0 ? 'text-emerald-600' : 'text-rose-500')}">${pnlDisplay}</span>
                            </div>
                            <div class="flex justify-between items-center mt-0.5">
                                <p class="text-[10px] font-bold text-slate-400 uppercase">${trade.date}</p>
                                <span class="text-[9px] font-black ${statusColor} uppercase tracking-widest">${statusLabel} • ${trade.r_multiple || '0'}R</span>
                            </div>
                        </div>
                        <div id="chev-${tradeId}" class="transition-transform duration-300">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                    </div>
                    
                    <div id="pane-${tradeId}" class="details-pane bg-slate-50">
                        <div class="p-5 grid grid-cols-2 gap-y-4 gap-x-6 border-t border-slate-100">
                            <div>
                                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Status</label>
                                <p class="text-xs font-bold ${statusColor}">${statusLabel}</p>
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Entry Price</label>
                                <p class="text-xs font-mono font-bold">${trade.entry || '---'}</p>
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Stop Loss</label>
                                <p class="text-xs font-mono font-bold text-rose-400">${trade.sl || trade.stop_loss || '---'}</p>
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Target / Exit</label>
                                <p class="text-xs font-mono font-bold ${isRunning ? 'text-slate-300' : 'text-emerald-500'}">${trade.exit || trade.tp || 'OPEN'}</p>
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Risk Taken</label>
                                <p class="text-xs font-mono font-bold text-slate-600">$${parseFloat(trade.size || 0).toFixed(2)}</p>
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Fees</label>
                                <p class="text-xs font-mono font-bold text-slate-400">$${parseFloat(trade.commission || 0).toFixed(2)}</p>
                            </div>
                             <div class="col-span-2">
                                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest block mb-1">Analysis</label>
                                ${trade.chart ? `<a href="${trade.chart}" target="_blank" class="text-xs font-bold text-indigo-600 underline" onclick="event.stopPropagation()">View Chart</a>` : '<span class="text-xs font-bold text-slate-300">No Chart</span>'}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            calculateStats();
        }

        function showModal(type) {
            const mod = document.getElementById('modalContainer');
            mod.innerHTML = `
                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-end sm:items-center justify-center z-[100] p-4">
                    <div class="bg-white rounded-t-[32px] sm:rounded-[32px] p-8 w-full max-w-sm shadow-2xl animate-in slide-in-from-bottom duration-300">
                        <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-6"></div>
                        <h2 class="text-xl font-black mb-4">Journal Info</h2>
                        <p class="text-sm text-slate-500 leading-relaxed mb-8">
                            Trades with an empty "Exit" price are marked as <span class="text-blue-500 font-bold">RUNNING</span>.
                        </p>
                        <button onclick="document.getElementById('modalContainer').innerHTML=''" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-sm">Got it</button>
                    </div>
                </div>
            `;
        }

        window.onload = loadData;
    </script>
</body>
</html>
